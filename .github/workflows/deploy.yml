name: Deploy LFS to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with LFS
        uses: actions/checkout@v4
        with:
          lfs: true # This forces GitHub to pull the actual large files, not pointers

      - name: Clean Git Hooks
        run: |
          git lfs uninstall
          rm -f .gitattributes

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true # This wipes history conflicts and forces a clean page push
