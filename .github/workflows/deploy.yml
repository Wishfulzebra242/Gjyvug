name: Deploy LFS to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with LFS
        uses: actions/checkout@v4
        with:
          lfs: true # Pulls the real 236MB file

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Packages your whole folder directly into a web tarball

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Officially streams the bundle straight to Pages without Git conflicts
